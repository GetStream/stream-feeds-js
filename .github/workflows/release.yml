name: Version and Release
env:
  VITE_STREAM_API_KEY: ${{ vars.CLIENT_TEST_API_KEY }}
  VITE_STREAM_API_SECRET: ${{ secrets.CLIENT_TEST_SECRET }}
  VITE_API_URL: ${{ vars.CLIENT_TEST_API_URL }}
  GITHUB_TOKEN: ${{ secrets.SDK_BOT_GH_TOKEN }}

on:
  workflow_dispatch:

concurrency:
  group: version-and-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write # Required for OIDC
  contents: write # required for committing the version bump

jobs:
  version-and-release:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.SDK_BOT_GH_TOKEN }}

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Lint Packages
        run: yarn lint:all

      - name: Build packages
        run: NODE_ENV=production yarn build:libs

      - name: Test packages
        run: yarn test:ci:libs

      - name: Run docs code snippets
        run: yarn test:docs-snippets

      - name: Release
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"
          yarn config set npmRegistryServer https://registry.npmjs.org/
          yarn release
